# Name of the GitHub Action
name: Generate Snake Contribution Graph

# Controls when the action will run.
on:
  # Run automatically every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allows manual runs from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository's code
      - uses: actions/checkout@v4

      # Step 2: Generate the snake animation files (Corrected Step)
      - uses: Platane/snk@v3
        with:
          # Your GitHub username
          github_user_name: SHADOW2669
          
          # Use the 'outputs' input to specify the files to generate.
          # This replaces the old 'gif_out_path' and 'svg_out_path' inputs.
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake.gif
        # The GITHUB_TOKEN is not needed in the 'with' section for this action;
        # it reads it from the environment by default.

      # Step 3: Commit and push the generated files to the 'output' branch
      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          # The directory that contains the files to be pushed
          build_dir: dist
          # The branch to which the files will be pushed
          target_branch: output
        env:
          # The GITHUB_TOKEN is required for authentication to push to the branch
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
