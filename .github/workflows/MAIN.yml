# Name of the GitHub Action
name: Generate Snake Contribution Graph

# Controls when the action will run.
on:
  # Run automatically every 6 hours
  schedule:
    - cron: "0 */6 * * *"
  # Allows manual runs from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository's code
      # Using v4 for the latest features and security updates.
      - uses: actions/checkout@v4

      # Step 2: Generate the snake animation files
      # It's best practice to use a specific version tag (e.g., @v3) instead of @master
      # to prevent your workflow from breaking with future updates.
      - uses: Platane/snk@v3
        id: snake-gif
        with:
          # Your GitHub username
          github_user_name: SHADOW2669
          # Define the output paths for the generated files
          gif_out_path: dist/github-contribution-grid-snake.gif
          svg_out_path: dist/github-contribution-grid-snake.svg
        # Use the GITHUB_TOKEN to ensure the action can retrieve your contribution graph
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Step 3: Commit and push the generated files to the 'output' branch
      # This single action handles creating the 'output' branch if it doesn't exist
      # and pushing the contents of the 'build_dir' to it.
      # This replaces the two separate push actions from your original file.
      - name: Deploy to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          # The directory that contains the files to be pushed
          build_dir: dist
          # The branch to which the files will be pushed
          target_branch: output
        env:
          # The GITHUB_TOKEN is required for authentication
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
